{% extends "base.html" %}
{% block title %}Registro - AcademIA{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon"><i class="fas fa-user-graduate"></i></span>
            <h1>Crear Cuenta</h1>
            <p><i class="fas fa-sparkles"></i> Registrate para usar el asistente</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Nombre completo</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Correo electronico</label>
                <input type="email" id="email" name="email" required placeholder="tu@correo.com">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Contrasena</label>
                <input type="password" id="contrasena" name="contrasena" required minlength="6" placeholder="Minimo 6 caracteres">
            </div>
            <div class="form-group">
                <label><i class="fas fa-check-circle"></i> Confirmar contrasena</label>
                <input type="password" id="confirmar" name="confirmar" required placeholder="Repite la contrasena">
            </div>
            <button type="submit" class="btn-primary btn-full"><i class="fas fa-user-plus"></i> Crear Cuenta</button>
        </form>
        <p class="auth-link">Ya tienes cuenta? <a href="{{ url_for('login') }}"><i class="fas fa-sign-in-alt"></i> Inicia sesion</a></p>
    </div>
</div>
{% endblock %}
