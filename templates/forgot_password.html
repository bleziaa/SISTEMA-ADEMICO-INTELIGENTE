{% extends "base.html" %}
{% block title %}Recuperar Contrasena - AcademIA{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon"><i class="fas fa-key"></i></span>
            <h1>Recuperar Contrasena</h1>
            <p>Ingresa tu correo para restablecer tu contrasena</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Correo electronico</label>
                <input type="email" id="email" name="email" required placeholder="tu@correo.com">
            </div>
            <button type="submit" class="btn-primary btn-full"><i class="fas fa-paper-plane"></i> Enviar</button>
        </form>
        <p class="auth-link"><a href="{{ url_for('login') }}"><i class="fas fa-arrow-left"></i> Volver al inicio de sesion</a></p>
    </div>
</div>
{% endblock %}
