{% extends "base.html" %}
{% block title %}Nueva Contrasena - AcademIA{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon"><i class="fas fa-lock-open"></i></span>
            <h1>Nueva Contrasena</h1>
            <p>Escribe tu nueva contrasena</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Nueva contrasena</label>
                <input type="password" id="contrasena" name="contrasena" required minlength="8" placeholder="Minimo 8 caracteres">
            </div>
            <div class="form-group">
                <label><i class="fas fa-check-circle"></i> Confirmar contrasena</label>
                <input type="password" id="confirmar" name="confirmar" required placeholder="Repite la contrasena">
            </div>
            <button type="submit" class="btn-primary btn-full"><i class="fas fa-save"></i> Guardar contrasena</button>
        </form>
        <p class="auth-link"><a href="{{ url_for('login') }}"><i class="fas fa-arrow-left"></i> Volver al inicio de sesion</a></p>
    </div>
</div>
{% endblock %}
